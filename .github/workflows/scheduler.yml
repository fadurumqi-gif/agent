name: Weekly OilGas News Summary

on:
  schedule:
    # Запуск каждый понедельник в 07:00 UTC (10:00 по МСК)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Для ручного запуска

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Обновлено до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Обновлено до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the bot
        env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
         GIGACHAT_API_KEY: ${{ secrets.GIGACHAT_API_KEY }} # <-- ЭТУ СТРОКУ ДОБАВЛЯЕМ
         TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
         LLM_PROVIDER: "gigachat"
        run: python main.py
