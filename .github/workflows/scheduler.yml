name: Weekly OilGas News Summary

on:
  schedule:
    # Запуск каждый понедельник в 07:00 UTC (это 10:00 по Московскому времени)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Позволяет запустить вручную для тестирования

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GIGACHAT_API_KEY: ${{ secrets.GIGACHAT_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          LLM_PROVIDER: "gigachat"
        run: python main.py
